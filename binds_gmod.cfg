// ---------- COMANDOS DE CHAT (executados pelo PYTHON) ----------

// !drop — solta a arma da mao
bind "f6" "lua_run Entity(1):DropWeapon(Entity(1):GetActiveWeapon())"

// !barril — barril explosivo em chamas na mira
bind "f7" "lua_run e=ents.Create('prop_physics') e:SetModel('models/props_c17/oildrum001_explosive.mdl') e:SetPos(Entity(1):GetEyeTrace().HitPos) e:Spawn() e:Ignite(20)"

// !cura — vida maxima
bind "f8" "lua_run Entity(1):SetHealth(100)"

// !formiga — jogador minusculo por 10s
bind "f9" "lua_run Entity(1):SetModelScale(0.3, 1) timer.Simple(10, function() Entity(1):SetModelScale(1, 1) end)"

// tyrant resident evil npc_re_tyrant
bind "f10" "lua_run a=navmesh.Find(Entity(1):GetPos(),500,100,100) e=ents.Create('npc_re_tyrant') e:SetPos(a[math.random(#a)]:GetCenter()) e:Spawn()"

// Seguir — pegar fogo (Tikfinity pressiona F10)
bind "p" "lua_run Entity(1):Ignite(10)"

// bomba 1000lb
bind "f3" "lua_run local p=Entity(1) local pos=p:GetPos()+Vector(math.random(-1500,1500),math.random(-1500,1500),1500) local b=ents.Create('gb5_heavy_b_1000lb') b:SetPos(pos) b:Spawn() b:Activate() b:Use(p,p,3,1)"


// ---------- EVENTOS DO TIKFINITY (likes / follow / presentes) ----------

// 3 likes — zumbi
bind "f11" "lua_run a=navmesh.Find(Entity(1):GetPos(),500,100,100) e=ents.Create('drg_codz_bo2_buried') e:SetPos(a[math.random(#a)]:GetCenter()) e:Spawn()"
// lista zumbi
bind "f11" "spawn_zumbi_cod"

// Presente Urso Misha — FNAF Nextbot (Tikfinity pressiona F11)
bind "l" "lua_run a=navmesh.GetAllNavAreas() e=ents.Create('npc_drgbase_thebonwalten') e:SetPos(a[math.random(#a)]:GetCenter()) e:Spawn()"

// Presente Rosa — Galinha explosiva (Tikfinity pressiona Ctrl+3)
bind "o" "lua_run a=navmesh.Find(Entity(1):GetPos(),500,100,100) e=ents.Create('npc_vj_mili_chicleet') e:SetPos(a[math.random(#a)]:GetCenter()) e:Spawn()"

// Presente Tiktok — Backrooms (Tikfinity pressiona Ctrl+4)
bind "," "lua_run a=navmesh.Find(Entity(1):GetPos(),500,100,100) e=ents.Create('drg_costumeman') e:SetPos(a[math.random(#a)]:GetCenter()) e:Spawn()"

// Presente Tiny Diny — T-Rex (Tikfinity pressiona Ctrl+5)
bind "." "lua_run a=navmesh.Find(Entity(1):GetPos(),500,100,100) e=ents.Create('drg_milli_echo_jw_tyrannosaurus_rex') e:SetPos(a[math.random(#a)]:GetCenter()) e:Spawn()"

// ============================================================
// ATENCAO — COMBOS COM CTRL:
// O Source NAO suporta nativamente bind de combos ("ctrl+1").
// Se os binds acima com ctrl nao funcionarem no seu GMod, use
// teclas livres simples e ajuste o commands.json. Sugestao:
//   !formiga -> "f4"   | no commands.json: "keys": ["f4"]
//   !barco   -> "f5"   | no commands.json: "keys": ["f5"]
