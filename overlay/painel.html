<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Caos — Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        rgba(15, 14, 20, 0.92);
    --bg-soft:   rgba(255, 255, 255, 0.04);
    --line:      rgba(255, 255, 255, 0.08);
    --accent:    #a970ff;
    --accent-dim:#7a5bd0;
    --ink:       #f2f0f7;
    --ink-dim:   #8b8794;
    --ok:        #4ade80;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; }

  .painel {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: 1px solid rgba(169, 112, 255, 0.35);
    border-radius: 18px;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: entrada .6s cubic-bezier(.22, 1, .36, 1) both;
  }
  .painel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .9;
  }
  @keyframes entrada {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .conteudo-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  /* ===================== HEADER / LIKES ===================== */
  .topo {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 16px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .topo .zicon {
    width: 46px; height: 46px;
    border-radius: 11px;
    object-fit: cover;
    background: var(--bg-soft);
    padding: 3px;
  }
  .topo .likes-info { flex: 1; }
  .topo .likes-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .topo .likes-label { font-size: 16px; font-weight: 700; }
  .topo .likes-label span { color: #00f0ff; }
  .topo .likes-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 800; color: var(--ink-dim);
  }
  .topo .likes-num b { color: #00f0ff; }
  /* Barra de likes do ZUMBI com glow neon ciano pulsante.
     O brilho fica so aqui — o resto do painel continua limpo. */
  .likes-bar {
    position: relative;
    height: 9px; border-radius: 999px;
    background: rgba(0, 240, 255, 0.10);
    border: 1px solid rgba(0, 240, 255, 0.35);
    animation: neonPulse 1.8s ease-in-out infinite;
  }
  @keyframes neonPulse {
    0%, 100% {
      box-shadow: 0 0 6px rgba(0,240,255,0.5),
                  0 0 12px rgba(0,240,255,0.25);
      border-color: rgba(0,240,255,0.35);
    }
    50% {
      box-shadow: 0 0 12px rgba(0,240,255,0.9),
                  0 0 22px rgba(0,240,255,0.5),
                  0 0 32px rgba(0,240,255,0.25);
      border-color: rgba(0,240,255,0.7);
    }
  }
  .likes-fill {
    height: 100%; width: 0%; border-radius: 999px;
    background: linear-gradient(90deg, #00b8ff, #00f0ff);
    box-shadow: 0 0 8px rgba(0,240,255,0.8);
    transition: width .45s cubic-bezier(.22, 1, .36, 1);
  }
  /* quando bate a meta, um flash ciano mais forte */
  .topo.meta-hit .likes-bar { animation: neonBoom .9s ease; }
  @keyframes neonBoom {
    0%   { box-shadow: 0 0 6px rgba(0,240,255,0.5); }
    30%  { box-shadow: 0 0 20px rgba(0,240,255,1),
                       0 0 40px rgba(0,240,255,0.7),
                       0 0 60px rgba(0,240,255,0.4); }
    100% { box-shadow: 0 0 6px rgba(0,240,255,0.5); }
  }

  /* ===================== CONTEUDO ===================== */
  /* compacto: agrupa no topo, sem esticar o espaco entre os itens */
  #conteudo {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 2px;
    min-height: 0;
    overflow: hidden;
  }

  .secao {
    display: flex; align-items: center; gap: 9px;
    font-size: 12px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--ink-dim);
    margin: 8px 0 3px;
  }
  /* a primeira secao nao precisa de margem em cima */
  #conteudo > .secao:first-child { margin-top: 2px; }
  .secao .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .secao.presentes .dot { background: var(--ok); }

  /* ----- lista (1 coluna, comandos de chat) ----- */
  .lista .row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 8px;
    border-radius: 10px;
  }
  .lista .row .gatilho {
    min-width: 104px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; font-weight: 700; color: var(--ink);
  }
  .lista .row .seta { color: var(--ink-dim); font-size: 13px; }
  /* o efeito ocupa o resto da largura (texto esticado pra direita) */
  .lista .row .efeito {
    flex: 1;
    font-size: 17px; font-weight: 600; color: var(--ink);
  }

  /* ----- grade (2 colunas, com nome: comandos em grade) ----- */
  .grade {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 14px;
  }
  .grade .row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 10px;
  }
  .grade .row .textos { display: flex; flex-direction: column; min-width: 0; }
  .grade .row .gatilho {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .grade .row .efeito {
    font-size: 13px; font-weight: 600; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ----- grade-icone: presentes com imagem grande, sem caixa, 4 por linha ----- */
  .grade-icone {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0px 2px;
  }
  .grade-icone .row {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0px;
    padding: 0px 2px 2px;
    border-radius: 12px;
    transition: transform .2s;
  }
  .grade-icone .row .ico {
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    line-height: 1;
  }
  .grade-icone .row .ico img {
    width: 64px; height: 64px;
    object-fit: contain;
    /* margem negativa "puxa" o texto pra mais perto da imagem */
    margin-bottom: -4px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    transition: transform .2s, filter .3s;
  }
  /* efeito embaixo da imagem (o que faz, ex: "Galinha Explosiva") */
  .grade-icone .row .efeito {
    font-size: 10px; font-weight: 700;
    color: var(--accent);
    text-align: center;
    line-height: 1.15;
    width: 100%;
    letter-spacing: .2px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    /* permite quebrar em 2 linhas se o nome for longo (ex: Galinha Explosiva) */
    white-space: normal;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* flash quando o presente dispara: a imagem cresce e brilha */
  .grade-icone .row.fired .ico img {
    animation: imgPop .5s cubic-bezier(.18,1.3,.4,1);
  }
  @keyframes imgPop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.4); filter: drop-shadow(0 0 14px rgba(169,112,255,0.9)); }
    100% { transform: scale(1); }
  }
  .grade-icone .row.cooling { opacity: .4; }

  /* ----- icones (comum) ----- */
  .row .ico {
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .lista .row .ico { width: 34px; min-width: 34px; height: 34px; font-size: 21px; }
  .lista .row .ico img { width: 34px; height: 34px; object-fit: contain; }
  .grade .row .ico { width: 30px; min-width: 30px; height: 30px; font-size: 18px; }
  .grade .row .ico img { width: 42px; height: 42px; object-fit: contain; }

  /* ----- estados (comum) ----- */
  .row.fired { animation: fired 1s ease; }
  @keyframes fired {
    0%   { background: rgba(169,112,255,0); }
    20%  { background: rgba(169,112,255,0.28); }
    100% { background: rgba(169,112,255,0); }
  }
  .row.cooling { opacity: .4; }
  .cd-bar {
    position: absolute; left: 8px; right: 8px; bottom: 2px;
    height: 2px; border-radius: 2px;
    background: rgba(255,255,255,0.08); overflow: hidden;
    opacity: 0; transition: opacity .2s;
  }
  .row.cooling .cd-bar { opacity: 1; }
  .cd-fill { height: 100%; width: 0%; background: var(--accent); }

  /* ===================== RODAPE ===================== */
  .rodape {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: .5px; text-transform: uppercase;
    color: var(--ink-dim);
    flex-shrink: 0;
    padding-top: 12px; margin-top: 6px;
    border-top: 1px solid var(--line);
  }
  .fila { font-family: 'JetBrains Mono', monospace; }
  .fila b { color: var(--accent); }
  .status { display: flex; align-items: center; gap: 6px; }
  .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-dim); }
  .ws-dot.on { background: var(--ok); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="painel">
  <div class="conteudo-wrap">

    <div class="topo" id="topo">
      <img class="zicon" src="assets/zzz.png" alt="Zumbi">
      <div class="likes-info">
        <div class="likes-row">
          <span class="likes-label">Likes <span>→</span> Zumbi</span>
          <span class="likes-num"><b id="likesNow">0</b>/<span id="likesGoal">10</span></span>
        </div>
        <div class="likes-bar"><div class="likes-fill" id="likesFill"></div></div>
      </div>
    </div>

    <div id="conteudo"></div>

    <div class="rodape">
      <span class="status"><span class="ws-dot" id="wsDot"></span><span id="wsLabel">offline</span></span>
      <span class="fila">fila <b id="queueSize">0</b></span>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  /* layout: "lista" (1 coluna) ou "grade" (2 colunas). Default: lista. */
  var FALLBACK_CONFIG = {
    secoes: [
      { titulo: 'Interações grátis', estilo: 'padrao', layout: 'grade', itens: [
        { id: 'seguir',   img: 'assets/ff.png', gatilho: 'Seguir',   efeito: 'Pegar Fogo' },
        { id: '!drop',    img: 'assets/aa.png', gatilho: '!drop',    efeito: 'Cai Arma',       cooldown: true },
        { id: '!barril',  img: 'assets/bb.png', gatilho: '!barril',  efeito: 'Fogo na Mira',   cooldown: true },
        { id: '!cura',    emoji: '💚',           gatilho: '!cura',    efeito: 'Vida Máx',       cooldown: true },
        { id: '!formiga', emoji: '🐜',           gatilho: '!formiga', efeito: 'Encolher',       cooldown: true }
      ]},
      { titulo: 'Presentes', estilo: 'presentes', layout: 'grade-icone', itens: [
        { id: 'rose', emoji: '🌹', gatilho: 'Rosa', efeito: 'Galinha Explosiva' },
        { id: 'mishka bear', emoji: '🧸', gatilho: 'Urso Misha', efeito: 'FNAF Nextbot' },
        { id: 'gg', emoji: 'GG', gatilho: 'GG', efeito: 'Tyrant RE' },
        { id: 'gamepad', img: 'assets/gamepad.png', gatilho: 'Controle', efeito: 'Bomba 1000lb' },
        { id: 'tiktok', img: 'assets/tiktok.png', gatilho: 'Tiktok', efeito: 'Bomba 1000lb' }
      ]}
    ]
  };

  function makeRow(item, modo) {
    var rowEl = document.createElement('div');
    rowEl.className = 'row';
    rowEl.setAttribute('data-cmd', String(item.id || '').toLowerCase());

    var ico = document.createElement('div');
    ico.className = 'ico';
    if (item.img) {
      var im = document.createElement('img');
      im.src = item.img; im.alt = '';
      ico.appendChild(im);
    } else {
      ico.textContent = item.emoji || '•';
    }
    rowEl.appendChild(ico);

    if (modo === 'grade-icone') {
      // so o efeito (o que faz), sem nome/gatilho redundante
      var efe0 = document.createElement('div');
      efe0.className = 'efeito';
      efe0.textContent = item.efeito || '';
      rowEl.appendChild(efe0);

    } else if (modo === 'grade') {
      // icone + (gatilho em cima, efeito embaixo) — compacto p/ 2 colunas
      var textos = document.createElement('div');
      textos.className = 'textos';
      var gat = document.createElement('div');
      gat.className = 'gatilho';
      gat.textContent = item.gatilho || '';
      var efe = document.createElement('div');
      efe.className = 'efeito';
      efe.textContent = item.efeito || '';
      textos.appendChild(gat);
      textos.appendChild(efe);
      rowEl.appendChild(textos);

    } else {
      // lista: icone  gatilho  →  efeito (esticado)
      var gat2 = document.createElement('div');
      gat2.className = 'gatilho';
      gat2.textContent = item.gatilho || '';
      rowEl.appendChild(gat2);

      var seta = document.createElement('div');
      seta.className = 'seta';
      seta.textContent = '→';
      rowEl.appendChild(seta);

      var efe2 = document.createElement('div');
      efe2.className = 'efeito';
      efe2.textContent = item.efeito || '';
      rowEl.appendChild(efe2);
    }

    if (item.cooldown) {
      var bar = document.createElement('div');
      bar.className = 'cd-bar';
      var fill = document.createElement('div');
      fill.className = 'cd-fill';
      bar.appendChild(fill);
      rowEl.appendChild(bar);
    }
    return rowEl;
  }

  function renderPainel(cfg) {
    var root = document.getElementById('conteudo');
    root.innerHTML = '';
    (cfg.secoes || []).forEach(function (sec) {
      var titulo = document.createElement('div');
      titulo.className = 'secao' + (sec.estilo === 'presentes' ? ' presentes' : '');
      var dot = document.createElement('span');
      dot.className = 'dot';
      titulo.appendChild(dot);
      titulo.appendChild(document.createTextNode(sec.titulo));
      root.appendChild(titulo);

      var modo = (sec.layout === 'grade-icone') ? 'grade-icone'
               : (sec.layout === 'grade')       ? 'grade'
               : 'lista';
      var container = document.createElement('div');
      container.className = modo;
      (sec.itens || []).forEach(function (item) {
        container.appendChild(makeRow(item, modo));
      });
      root.appendChild(container);
    });
  }

  fetch('painel_config.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
    .then(renderPainel)
    .catch(function () { renderPainel(FALLBACK_CONFIG); });

  var WS_URL = 'ws://localhost:8765';
  var RECONNECT_MS = 5000;

  var wsDot = document.getElementById('wsDot');
  var wsLabel = document.getElementById('wsLabel');
  var likesNow = document.getElementById('likesNow');
  var likesGoal = document.getElementById('likesGoal');
  var likesFill = document.getElementById('likesFill');
  var topo = document.getElementById('topo');
  var queueSize = document.getElementById('queueSize');

  var cooldowns = {};

  function row(cmd) {
    return document.querySelector('.row[data-cmd="' + String(cmd).toLowerCase() + '"]');
  }
  function flashRow(cmd) {
    var el = row(cmd);
    if (!el) return;
    el.classList.remove('fired');
    void el.offsetWidth;
    el.classList.add('fired');
  }
  function startCooldown(cmd, readyAt, duration) {
    var el = row(cmd);
    if (!el || !duration) return;
    cooldowns[cmd] = { readyAt: readyAt * 1000, duration: duration * 1000 };
    el.classList.add('cooling');
  }
  function tick() {
    var now = Date.now();
    Object.keys(cooldowns).forEach(function (cmd) {
      var cd = cooldowns[cmd];
      var el = row(cmd);
      if (!el) { delete cooldowns[cmd]; return; }
      var remaining = cd.readyAt - now;
      var fill = el.querySelector('.cd-fill');
      if (remaining <= 0) {
        el.classList.remove('cooling');
        if (fill) fill.style.width = '0%';
        delete cooldowns[cmd];
        return;
      }
      if (fill) fill.style.width = ((remaining / cd.duration) * 100).toFixed(1) + '%';
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  function setLikes(current, goal, triggered) {
    likesNow.textContent = current;
    likesGoal.textContent = goal;
    likesFill.style.width = Math.min(100, (current / goal) * 100) + '%';
    if (triggered) {
      topo.classList.remove('meta-hit');
      void topo.offsetWidth;
      topo.classList.add('meta-hit');
    }
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'executed': flashRow(msg.command); break;
      case 'cooldown': startCooldown(msg.command, msg.ready_at, msg.duration); break;
      case 'likes':    setLikes(msg.current, msg.goal, msg.triggered); break;
      case 'social':
        if (msg.kind === 'follow') flashRow('seguir');
        else if (msg.kind === 'gift') flashRow((msg.gift || '').toLowerCase());
        break;
      case 'queue': queueSize.textContent = msg.size; break;
    }
  }

  function connect() {
    var ws;
    try { ws = new WebSocket(WS_URL); }
    catch (err) { setTimeout(connect, RECONNECT_MS); return; }
    ws.onopen = function () { wsDot.classList.add('on'); wsLabel.textContent = 'ao vivo'; };
    ws.onmessage = function (event) {
      try { handleMessage(JSON.parse(event.data)); } catch (err) {}
    };
    ws.onclose = function () {
      wsDot.classList.remove('on'); wsLabel.textContent = 'offline';
      setTimeout(connect, RECONNECT_MS);
    };
    ws.onerror = function () { ws.close(); };
  }
  connect();
})();
</script>
</body>
</html>
