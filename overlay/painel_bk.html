<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Caos — Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #eafff6;
    --ink-dim: #9fc4b4;
    --cyan: #00f0ff;
    --yellow: #ffe600;
    --red: #ff4d4d;
    --green: #56ff9e;
    --panel-w: 460px;
    --row-h: 52px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 24px;
    background: transparent;
    font-family: 'Chakra Petch', sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: flex-start;
  }

  /* ===================== PAINEL ===================== */
  .painel {
    position: relative;
    width: var(--panel-w);
    padding: 46px 44px 38px;
    background: url('assets/fundo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    overflow: hidden;
    animation: entrada .8s cubic-bezier(.22, 1, .36, 1) both;
  }

  @keyframes entrada {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  h1 {
    margin: 0 0 6px;
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--yellow);
    text-shadow: 0 0 14px rgba(255, 230, 0, .55);
  }

  .subtitulo {
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 18px;
  }

  /* ===================== LIKES ===================== */
  .likes-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    margin-bottom: 18px;
    border: 1px solid rgba(0, 240, 255, .35);
    border-radius: 8px;
    background: rgba(0, 20, 14, .45);
  }

  .likes-card img { width: 38px; height: 38px; object-fit: contain; }

  .likes-info { flex: 1; }

  .likes-top {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .likes-top .meta { color: var(--ink-dim); }
  .likes-top .num  { color: var(--yellow); font-family: 'Roboto Mono', monospace; }

  .likes-bar {
    height: 8px;
    border-radius: 4px;
    background: rgba(255, 255, 255, .08);
    overflow: hidden;
  }

  .likes-fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--cyan), var(--yellow));
    box-shadow: 0 0 10px rgba(0, 240, 255, .6);
    transition: width .45s cubic-bezier(.22, 1, .36, 1);
  }

  .likes-card.meta-hit { animation: metaFlash .9s ease; }
  @keyframes metaFlash {
    0%   { box-shadow: inset 0 0 0 rgba(255,230,0,0); }
    30%  { box-shadow: inset 0 0 26px rgba(255,230,0,.55); border-color: var(--yellow); }
    100% { box-shadow: inset 0 0 0 rgba(255,230,0,0); }
  }

  /* ===================== SEÇÕES ===================== */
  .secao {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--cyan);
  }

  .secao.presentes { color: var(--red); }

  .secao::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, currentColor, transparent);
    opacity: .5;
  }

  /* ===================== LINHAS DE COMANDO ===================== */
  .row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: var(--row-h);
    padding: 4px 8px;
    border-radius: 6px;
    transition: opacity .3s, filter .3s;
  }

  .row .ico {
    width: 44px;
    min-width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .row .ico img { width: 44px; height: 44px; object-fit: contain; }

  .row .gatilho {
    min-width: 112px;
    font-family: 'Roboto Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    text-shadow: 0 0 8px rgba(255, 255, 255, .25);
  }

  .row .seta { color: var(--cyan); font-size: 14px; opacity: .8; }

  .row .efeito {
    font-size: 17px;
    font-weight: 700;
    color: var(--yellow);
    letter-spacing: .5px;
  }

  /* destaque quando o comando acabou de executar */
  .row.fired { animation: fired .8s ease; }
  @keyframes fired {
    0%   { background: rgba(255, 230, 0, .0); }
    25%  { background: rgba(255, 230, 0, .22); }
    100% { background: rgba(255, 230, 0, .0); }
  }

  /* estado em cooldown */
  .row.cooling { opacity: .45; filter: saturate(.4); }

  .cd-bar {
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: 0;
    height: 3px;
    border-radius: 2px;
    background: rgba(255, 255, 255, .07);
    overflow: hidden;
    opacity: 0;
    transition: opacity .25s;
  }

  .row.cooling .cd-bar { opacity: 1; }

  .cd-fill {
    height: 100%;
    width: 0%;
    background: var(--cyan);
    box-shadow: 0 0 8px rgba(0, 240, 255, .8);
  }

  /* ===================== STATUS / FILA ===================== */
  .rodape {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .fila { font-family: 'Roboto Mono', monospace; }
  .fila .n { color: var(--cyan); }

  .ws-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    background: var(--red);
    vertical-align: middle;
  }

  .ws-dot.on {
    background: var(--green);
    box-shadow: 0 0 8px rgba(86, 255, 158, .9);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="painel">
  <h1>Regras do Caos</h1>
  <div class="subtitulo">Você controla a live</div>

  <!-- META DE LIKES -->
  <div class="likes-card" id="likesCard">
    <img src="assets/zzz.png" alt="Zumbi">
    <div class="likes-info">
      <div class="likes-top">
        <span class="meta">Likes → Zumbi</span>
        <span class="num"><span id="likesNow">0</span>/<span id="likesGoal">15</span></span>
      </div>
      <div class="likes-bar"><div class="likes-fill" id="likesFill"></div></div>
    </div>
  </div>

  <div id="conteudo"></div>

  <div class="rodape">
    <span><span class="ws-dot" id="wsDot"></span><span id="wsLabel">offline</span></span>
    <span class="fila">fila <span class="n" id="queueSize">0</span></span>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ============ RENDER DINAMICO (painel_config.json) ============ */
  var FALLBACK_CONFIG = {
    secoes: [
      { titulo: '⚡ Interações grátis', estilo: 'padrao', itens: [
        { id: 'seguir',   img: 'assets/ff.png', gatilho: 'Seguir',   efeito: 'Pegar Fogo' },
        { id: '!drop',    img: 'assets/aa.png', gatilho: '!drop',    efeito: 'Cai Arma',       cooldown: true },
        { id: '!barril',  emoji: '🛢️',          gatilho: '!barril',  efeito: 'Fogo na Mira',   cooldown: true },
        { id: '!cura',    emoji: '💚',           gatilho: '!cura',    efeito: 'Vida Máx',       cooldown: true },
        { id: '!formiga', emoji: '🐜',           gatilho: '!formiga', efeito: 'Encolher',       cooldown: true }
      ]},
      { titulo: '🎁 Presentes', estilo: 'presentes', itens: [
        { id: 'rose', emoji: '🌹', gatilho: 'Rosa', efeito: 'Galinha Explosiva' },
        { id: 'mishka bear', emoji: '🧸', gatilho: 'Urso Misha', efeito: 'FNAF Nextbot' },
        { id: 'gamepad', emoji: '🎮', gatilho: 'Controle', efeito: 'Bomba 1000lb' },
        { id: 'capybara', emoji: '🦦', gatilho: 'Capybara', efeito: 'Tyrant RE' }
      ]}
    ]
  };

  function renderPainel(cfg) {
    var root = document.getElementById('conteudo');
    root.innerHTML = '';
    (cfg.secoes || []).forEach(function (sec) {
      var titulo = document.createElement('div');
      titulo.className = 'secao' + (sec.estilo === 'presentes' ? ' presentes' : '');
      titulo.textContent = sec.titulo;
      root.appendChild(titulo);
      (sec.itens || []).forEach(function (item) {
        var row = document.createElement('div');
        row.className = 'row';
        row.setAttribute('data-cmd', String(item.id || '').toLowerCase());

        var ico = document.createElement('div');
        ico.className = 'ico';
        if (item.img) {
          var im = document.createElement('img');
          im.src = item.img;
          im.alt = '';
          ico.appendChild(im);
        } else {
          ico.textContent = item.emoji || '⚡';
        }
        row.appendChild(ico);

        var gat = document.createElement('div');
        gat.className = 'gatilho';
        gat.textContent = item.gatilho || '';
        row.appendChild(gat);

        var seta = document.createElement('div');
        seta.className = 'seta';
        seta.textContent = '▶';
        row.appendChild(seta);

        var efe = document.createElement('div');
        efe.className = 'efeito';
        efe.textContent = item.efeito || '';
        row.appendChild(efe);

        if (item.cooldown) {
          var bar = document.createElement('div');
          bar.className = 'cd-bar';
          var fill = document.createElement('div');
          fill.className = 'cd-fill';
          bar.appendChild(fill);
          row.appendChild(bar);
        }
        root.appendChild(row);
      });
    });
  }

  /* carrega o JSON; se falhar (ex: aberto sem servidor), usa o fallback */
  fetch('painel_config.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
    .then(renderPainel)
    .catch(function () { renderPainel(FALLBACK_CONFIG); });

  var WS_URL = 'ws://localhost:8765';
  var RECONNECT_MS = 5000;

  var wsDot = document.getElementById('wsDot');
  var wsLabel = document.getElementById('wsLabel');
  var likesNow = document.getElementById('likesNow');
  var likesGoal = document.getElementById('likesGoal');
  var likesFill = document.getElementById('likesFill');
  var likesCard = document.getElementById('likesCard');
  var queueSize = document.getElementById('queueSize');

  /* cooldowns ativos: trigger -> {readyAt, duration} */
  var cooldowns = {};

  function row(cmd) {
    return document.querySelector('.row[data-cmd="' + String(cmd).toLowerCase() + '"]');
  }

  function flashRow(cmd) {
    var el = row(cmd);
    if (!el) return;
    el.classList.remove('fired');
    void el.offsetWidth; /* reinicia a animação */
    el.classList.add('fired');
  }

  function startCooldown(cmd, readyAt, duration) {
    var el = row(cmd);
    if (!el || !duration) return;
    cooldowns[cmd] = { readyAt: readyAt * 1000, duration: duration * 1000 };
    el.classList.add('cooling');
  }

  /* anima as barras de cooldown localmente (sem depender de mensagens) */
  function tick() {
    var now = Date.now();
    Object.keys(cooldowns).forEach(function (cmd) {
      var cd = cooldowns[cmd];
      var el = row(cmd);
      if (!el) { delete cooldowns[cmd]; return; }
      var remaining = cd.readyAt - now;
      var fill = el.querySelector('.cd-fill');
      if (remaining <= 0) {
        el.classList.remove('cooling');
        if (fill) fill.style.width = '0%';
        delete cooldowns[cmd];
        return;
      }
      if (fill) {
        fill.style.width = ((remaining / cd.duration) * 100).toFixed(1) + '%';
      }
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  function setLikes(current, goal, triggered) {
    likesNow.textContent = current;
    likesGoal.textContent = goal;
    likesFill.style.width = Math.min(100, (current / goal) * 100) + '%';
    if (triggered) {
      likesCard.classList.remove('meta-hit');
      void likesCard.offsetWidth;
      likesCard.classList.add('meta-hit');
    }
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'executed':
        flashRow(msg.command);
        break;
      case 'cooldown':
        startCooldown(msg.command, msg.ready_at, msg.duration);
        break;
      case 'likes':
        setLikes(msg.current, msg.goal, msg.triggered);
        break;
      case 'social':
        if (msg.kind === 'follow') {
          flashRow('seguir');
        } else if (msg.kind === 'gift') {
          var giftCmd = (msg.gift || '').toLowerCase().indexOf('urso') >= 0 ? 'urso' : 'rosa';
          flashRow(giftCmd);
        }
        break;
      case 'queue':
        queueSize.textContent = msg.size;
        break;
    }
  }

  /* conexão com reconexão automática — painel segue estático se cair (CA06) */
  function connect() {
    var ws;
    try {
      ws = new WebSocket(WS_URL);
    } catch (err) {
      setTimeout(connect, RECONNECT_MS);
      return;
    }

    ws.onopen = function () {
      wsDot.classList.add('on');
      wsLabel.textContent = 'ao vivo';
    };

    ws.onmessage = function (event) {
      try {
        handleMessage(JSON.parse(event.data));
      } catch (err) {
        /* mensagem malformada: ignora, painel nunca quebra na live */
      }
    };

    ws.onclose = function () {
      wsDot.classList.remove('on');
      wsLabel.textContent = 'offline';
      setTimeout(connect, RECONNECT_MS);
    };

    ws.onerror = function () { ws.close(); };
  }

  connect();
})();
</script>
</body>
</html>
